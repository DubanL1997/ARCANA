<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo — ARCANA</title>
<link rel="stylesheet" href="css/arcana.css">
<style>
.catalog-header{position:relative;z-index:1;padding:6rem 2rem 2rem;background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);}
.catalog-header-inner{max-width:1200px;margin:0 auto;}
.catalog-title{font-family:var(--display);font-size:clamp(2rem,5vw,3rem);font-weight:900;color:var(--text);letter-spacing:0.05em;margin-bottom:0.3rem;}
.catalog-sub{font-family:var(--serif);font-style:italic;color:var(--text2);font-size:1rem;margin-bottom:2rem;}

/* ── FILTERS ── */
.filters-bar{display:flex;gap:0.8rem;flex-wrap:wrap;align-items:center;padding:1.5rem 2rem;background:var(--bg2);border-bottom:1px solid var(--border2);position:sticky;top:64px;z-index:50;backdrop-filter:blur(10px);}
.filter-group{display:flex;align-items:center;gap:0.4rem;}
.filter-label{font-size:0.65rem;color:var(--text3);letter-spacing:0.15em;text-transform:uppercase;font-weight:600;}
.filter-select{background:var(--surface);border:1px solid var(--border);color:var(--text2);font-family:var(--sans);font-size:0.78rem;padding:0.4rem 0.7rem;border-radius:var(--r2);cursor:pointer;}
.filter-select:focus{outline:none;border-color:var(--purple);}
.search-bar{flex:1;min-width:200px;position:relative;}
.search-bar input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:50px;padding:0.5rem 1rem 0.5rem 2.5rem;color:var(--text);font-family:var(--sans);font-size:0.82rem;transition:border-color 0.2s;}
.search-bar input:focus{outline:none;border-color:var(--purple);}
.search-bar input::placeholder{color:var(--text3);}
.search-bar::before{content:'🔍';position:absolute;left:0.8rem;top:50%;transform:translateY(-50%);font-size:0.75rem;}
.results-count{font-size:0.72rem;color:var(--text3);white-space:nowrap;}

/* ── CATALOG GRID ── */
.catalog-section{position:relative;z-index:1;padding:2rem;min-height:60vh;}
.catalog-inner{max-width:1200px;margin:0 auto;}
.no-results{text-align:center;padding:4rem 2rem;color:var(--text3);}
.no-results p{font-family:var(--serif);font-style:italic;font-size:1.1rem;margin-top:0.5rem;}

/* ── VIEW TOGGLE ── */
.view-toggle{display:flex;gap:0.3rem;}
.view-btn{width:32px;height:32px;border-radius:var(--r2);background:none;border:1px solid var(--border);color:var(--text3);font-size:0.8rem;transition:all 0.2s;}
.view-btn.active{background:rgba(138,100,255,0.1);border-color:var(--purple);color:var(--purple3);}

/* ── LIST VIEW ── */
.novels-list{display:flex;flex-direction:column;gap:0.8rem;}
.novel-list-item{display:grid;grid-template-columns:80px 1fr auto;gap:1.2rem;align-items:center;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r2);padding:1rem 1.2rem;cursor:pointer;transition:all 0.2s;}
.novel-list-item:hover{background:var(--surface2);border-color:rgba(138,100,255,0.2);}
.list-cover{aspect-ratio:2/3;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;width:60px;height:80px;flex-shrink:0;}
.list-title{font-family:var(--display);font-size:0.9rem;font-weight:600;color:var(--text);letter-spacing:0.03em;margin-bottom:0.2rem;}
.list-author{font-size:0.72rem;color:var(--text3);margin-bottom:0.4rem;}
.list-desc{font-size:0.82rem;color:var(--text2);font-style:italic;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.list-meta{display:flex;flex-direction:column;align-items:flex-end;gap:0.3rem;flex-shrink:0;}
.list-stat{font-size:0.7rem;color:var(--text3);}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<nav id="navbar"></nav>

<div class="catalog-header">
  <div class="catalog-header-inner">
    <div class="section-label">Colección completa</div>
    <h1 class="catalog-title">Catálogo</h1>
    <p class="catalog-sub">Todas las novelas de ARCANA — encuentra tu próxima historia</p>
  </div>
</div>

<div class="filters-bar">
  <div class="filter-group">
    <span class="filter-label">Género</span>
    <select class="filter-select" id="genreFilter" onchange="window.applyFilters()">
      <option value="">Todos</option>
      <option>Ciencia Ficción</option>
      <option>Fantasía</option>
      <option>Romance</option>
      <option>Thriller</option>
      <option>Terror</option>
      <option>Acción</option>
      <option>Histórico</option>
      <option>Isekai</option>
    </select>
  </div>
  <div class="filter-group">
    <span class="filter-label">Estado</span>
    <select class="filter-select" id="statusFilter" onchange="window.applyFilters()">
      <option value="">Todos</option>
      <option value="en curso">En curso</option>
      <option value="completada">Completadas</option>
    </select>
  </div>
  <div class="filter-group">
    <span class="filter-label">Ordenar</span>
    <select class="filter-select" id="sortFilter" onchange="window.applyFilters()">
      <option value="views">Más leídas</option>
      <option value="rating">Mejor valoradas</option>
      <option value="new">Más nuevas</option>
      <option value="favorites">Más favoriteadas</option>
    </select>
  </div>
  <div class="search-bar">
    <input type="text" id="searchFilter" placeholder="Buscar por título, autor o género..." oninput="window.applyFilters()">
  </div>
  <span class="results-count" id="resultsCount">Cargando...</span>
  <div class="view-toggle">
    <button class="view-btn active" id="gridViewBtn" onclick="setView('grid')" title="Cuadrícula">⊞</button>
    <button class="view-btn" id="listViewBtn" onclick="setView('list')" title="Lista">☰</button>
  </div>
</div>

<div class="catalog-section">
  <div class="catalog-inner">
    <div id="novelsCatalog" class="novels-grid"></div>
  </div>
</div>

<footer id="footer"></footer>
<div id="auth-modal"></div>
<div id="toast"></div>

<script src="js/data.js"></script>
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
  import { getFirestore, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
  import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

  const firebaseConfig = {
    apiKey: "AIzaSyC1Fn6QXJu0UtH086vlpH2l2P-CI_ul3_A",
    authDomain: "arcana-553dd.firebaseapp.com",
    projectId: "arcana-553dd",
    storageBucket: "arcana-553dd.firebasestorage.app",
    messagingSenderId: "674195855924",
    appId: "1:674195855924:web:1f88f303c99cf6a4b0c861"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  let allNovels = [];
  let currentView = 'grid';

  onAuthStateChanged(auth, (user) => {
    window._currentUser = user;
    window.dispatchEvent(new CustomEvent('arcana:authchange', { detail: user }));
  });

  async function loadLibrary() {
    try {
      // 1. Obtener de Firebase
      const snap = await getDocs(collection(db, "novels"));
      const fbNovels = [];
      snap.forEach(doc => fbNovels.push({ id: doc.id, ...doc.data() }));

      // 2. Combinar con locales de data.js
      allNovels = [...ARCANA_NOVELS, ...fbNovels];
      
      // 3. Aplicar filtros iniciales
      window.applyFilters();
    } catch (e) {
      console.error(e);
      showToast("Error conectando con la biblioteca");
    }
  }

  window.applyFilters = function() {
    const genre = document.getElementById('genreFilter').value;
    const status = document.getElementById('statusFilter').value;
    const sort = document.getElementById('sortFilter').value;
    const search = document.getElementById('searchFilter').value.toLowerCase();

    let filtered = [...allNovels];
    
    if(genre) filtered = filtered.filter(n => n.genres && n.genres.includes(genre));
    if(status) filtered = filtered.filter(n => n.status === status);
    if(search) filtered = filtered.filter(n => 
      n.title.toLowerCase().includes(search) || 
      n.author.toLowerCase().includes(search) || 
      (n.genres && n.genres.some(g => g.toLowerCase().includes(search)))
    );

    if(sort === 'views') filtered.sort((a,b) => (b.viewsNum || 0) - (a.viewsNum || 0));
    else if(sort === 'rating') filtered.sort((a,b) => (b.rating || 0) - (a.rating || 0));
    else if(sort === 'favorites') filtered.sort((a,b) => (b.favorites || 0) - (a.favorites || 0));
    else if(sort === 'new') filtered.sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

    document.getElementById('resultsCount').textContent = `${filtered.length} novela${filtered.length!==1?'s':''}`;
    renderCatalog(filtered);
  };

  function renderCatalog(novels) {
    const container = document.getElementById('novelsCatalog');
    if(!novels.length) {
      container.innerHTML = `<div class="no-results"><span style="font-size:2.5rem">🔍</span><p>No se encontraron novelas con esos filtros.</p></div>`;
      return;
    }

    if(currentView === 'grid') {
      container.className = 'novels-grid';
      container.innerHTML = novels.map(n => novelCardHTML(n)).join('');
    } else {
      container.className = 'novels-list';
      container.innerHTML = novels.map(n => `
        <div class="novel-list-item" onclick="window.location.href='novel.html?id=${n.id}'">
          <div class="list-cover ${n.cover || 'cover-1'}"><span>${n.icon || '🔮'}</span></div>
          <div>
            <div class="list-title">${n.title}</div>
            <div class="list-author">${n.author} · ${n.genres ? n.genres.slice(0,2).join(', ') : ''}</div>
            <p class="list-desc">${n.descShort || n.desc || ''}</p>
          </div>
          <div class="list-meta">
            <span class="list-stat">⭐ ${n.rating || 0}</span>
            <span class="list-stat">👁 ${n.views || 0}</span>
          </div>
        </div>`).join('');
    }
  }

  window.setView = function(v) {
    currentView = v;
    document.getElementById('gridViewBtn').classList.toggle('active', v==='grid');
    document.getElementById('listViewBtn').classList.toggle('active', v==='list');
    window.applyFilters();
  };

  // Inicializar
  initCanvas('bg-canvas');
  renderNavbar('catalog');
  renderFooter();
  loadLibrary();
</script>
</body>
</html>
