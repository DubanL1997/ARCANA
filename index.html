<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCANA — Novelas que Trascienden</title>
<link rel="stylesheet" href="css/arcana.css">
<style>
/* Estilos específicos para la sección dinámica de novedades */
.novel-grid-dynamic { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1.5rem; }
#hero { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 5rem 1.5rem; position: relative; overflow: hidden; }
.hero-inner { position: relative; z-index: 2; max-width: 860px; text-align: center; }
.hero-title { font-family: var(--display); font-size: clamp(3.5rem, 10vw, 7rem); font-weight: 900; line-height: 0.9; margin-bottom: 1rem; }
.hero-title span { background: linear-gradient(135deg, #fff, var(--purple3), var(--rose)); -webkit-background-clip: text; background-clip: text; color: transparent; }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<nav id="navbar"></nav>

<section id="hero">
  <div class="hero-inner">
    <div class="section-label" style="justify-content:center; margin-bottom:2rem;">Plataforma de Novelas Ligeras</div>
    <h1 class="hero-title"><span>ARCANA</span></h1>
    <p class="section-sub" style="font-size:1.2rem; margin-bottom:2.5rem;">Historias que trascienden lo ordinario. Lee, escribe y comparte.</p>
    <div style="display:flex; gap:1rem; justify-content:center; flex-wrap:wrap;">
      <a href="catalog.html" class="btn-lg btn-lg-primary">📚 Explorar catálogo</a>
      <button class="btn-lg btn-lg-ghost" onclick="openAuth('register')">✦ Crear cuenta gratis</button>
    </div>
    <div style="display:flex; justify-content:center; gap:3rem; margin-top:4rem; flex-wrap:wrap;">
      <div style="text-align:center;"><span id="total-novels" style="display:block; font-family:var(--display); font-size:2rem; font-weight:900;">--</span><span class="section-label" style="font-size:0.5rem;">Novelas</span></div>
      <div style="text-align:center;"><span style="display:block; font-family:var(--display); font-size:2rem; font-weight:900;">400+</span><span class="section-label" style="font-size:0.5rem;">Capítulos</span></div>
      <div style="text-align:center;"><span style="display:block; font-family:var(--display); font-size:2rem; font-weight:900;">100%</span><span class="section-label" style="font-size:0.5rem;">Gratis</span></div>
    </div>
  </div>
</section>

<section class="section" style="background:var(--bg2);">
  <div class="section-inner">
    <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:2rem; flex-wrap:wrap; gap:1rem;">
      <div>
        <div class="section-label">Recién llegadas</div>
        <h2 class="section-title">Nuevas Publicaciones</h2>
      </div>
      <a href="catalog.html?filter=new" class="btn-ghost" style="font-size:0.7rem;">Ver todas →</a>
    </div>
    <div id="recent-novels-container" class="novels-grid">
      <div style="grid-column:1/-1; text-align:center; padding:3rem; color:var(--text3);">Sincronizando con la base de datos...</div>
    </div>
  </div>
</section>

<section class="section" id="genres">
  <div class="section-inner">
    <div class="section-label">Explorar</div>
    <h2 class="section-title" style="margin-bottom:2rem;">Géneros Populares</h2>
    <div id="genres-grid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(140px,1fr)); gap:1rem;"></div>
  </div>
</section>

<footer id="footer"></footer>
<div id="auth-modal"></div> <div id="toast"></div>

<script src="js/data.js"></script>
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
  import { getFirestore, collection, query, orderBy, limit, getDocs } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
  import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

  const firebaseConfig = {
    apiKey: "AIzaSyC1Fn6QXJu0UtH086vlpH2l2P-CI_ul3_A",
    authDomain: "arcana-553dd.firebaseapp.com",
    projectId: "arcana-553dd",
    storageBucket: "arcana-553dd.firebasestorage.app",
    messagingSenderId: "674195855924",
    appId: "1:674195855924:web:1f88f303c99cf6a4b0c861"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  // Escuchar estado de autenticación para la Navbar global
  onAuthStateChanged(auth, user => {
    window._currentUser = user;
    window.dispatchEvent(new CustomEvent('arcana:authchange', { detail: user }));
  });

  async function initHomePage() {
    const container = document.getElementById('recent-novels-container');
    const novelCountEl = document.getElementById('total-novels');

    try {
      // 1. Cargar las 4 novelas más recientes de Firebase
      const q = query(collection(db, "novels"), orderBy("createdAt", "desc"), limit(4));
      const snap = await getDocs(q);
      
      // 2. Obtener el conteo total (Firebase + Locales)
      const totalNovelsCount = snap.size + (window.ARCANA_NOVELS ? ARCANA_NOVELS.length : 0);
      if(novelCountEl) novelCountEl.textContent = totalNovelsCount;

      if (snap.empty) {
        container.innerHTML = `<div style="grid-column:1/-1; text-align:center;">Explora el catálogo para ver las historias disponibles.</div>`;
      } else {
        let html = '';
        snap.forEach(doc => {
          const n = doc.data();
          // Usamos la función novelCardHTML definida en tu data.js para mantener el estilo
          html += novelCardHTML({ id: doc.id, ...n });
        });
        container.innerHTML = html;
      }
    } catch (e) {
      console.error("Error cargando novedades:", e);
      container.innerHTML = `<div style="grid-column:1/-1; text-align:center;">Conectando con el archivo local...</div>`;
    }
  }

  // Renderizar Géneros desde data.js
  const genresGrid = document.getElementById('genres-grid');
  if(genresGrid && window.ARCANA_GENRES) {
    genresGrid.innerHTML = ARCANA_GENRES.map(g => `
      <div class="novel-card" style="padding:1.5rem; text-align:center;" onclick="window.location.href='catalog.html?genre=${g.name}'">
        <div style="font-size:2.5rem; margin-bottom:1rem;">${g.icon}</div>
        <div class="novel-title">${g.name}</div>
        <div class="section-label" style="font-size:0.5rem; justify-content:center;">${g.count} Historias</div>
      </div>
    `).join('');
  }

  initCanvas('bg-canvas');
  renderNavbar('home');
  renderFooter();
  initHomePage();
</script>
</body>
</html>
