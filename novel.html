<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novela — ARCANA</title>
<link rel="stylesheet" href="css/arcana.css">
<style>
.novel-hero{position:relative;z-index:1;padding:6rem 2rem 3rem;background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);}
.novel-hero-inner{max-width:1000px;margin:0 auto;display:grid;grid-template-columns:220px 1fr;gap:3rem;align-items:start;}
.novel-big-cover{aspect-ratio:2/3;border-radius:var(--r);border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.5);}
.novel-big-cover-glow{position:absolute;inset:0;background:radial-gradient(circle at 50% 40%,rgba(138,100,255,0.2),transparent 60%);}
.novel-big-icon{font-size:5rem;filter:drop-shadow(0 0 25px rgba(138,100,255,0.5));position:relative;z-index:1;}
.novel-header-info{position:relative;z-index:1;}
.novel-status-tag{display:inline-block;padding:0.2rem 0.6rem;background:rgba(138,100,255,0.1);border:1px solid var(--border);border-radius:50px;font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--purple3);margin-bottom:1rem;}
.novel-full-title{font-family:var(--display);font-size:2.8rem;font-weight:900;color:var(--text);line-height:1.1;letter-spacing:0.02em;margin-bottom:0.4rem;}
.novel-full-subtitle{font-family:var(--display);font-size:1rem;color:var(--text2);margin-bottom:1.5rem;letter-spacing:0.1em;text-transform:uppercase;}
.novel-meta-row{display:flex;gap:1.5rem;margin-bottom:2rem;flex-wrap:wrap;}
.novel-meta-item{display:flex;flex-direction:column;gap:0.2rem;}
.novel-meta-label{font-size:0.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;}
.novel-meta-val{font-size:0.85rem;color:var(--text);font-weight:500;}
.novel-actions{display:flex;gap:0.8rem;flex-wrap:wrap;}

.novel-body{max-width:1000px;margin:0 auto;padding:3rem 2rem;display:grid;grid-template-columns:1fr 300px;gap:4rem;}
.novel-section-title{font-family:var(--display);font-size:0.8rem;text-transform:uppercase;letter-spacing:0.2em;color:var(--text3);margin-bottom:1.5rem;display:flex;align-items:center;gap:0.8rem;}
.novel-section-title::after{content:'';flex:1;height:1px;background:var(--border2);}
.novel-synopsis{font-size:0.95rem;line-height:1.7;color:var(--text2);margin-bottom:3rem;white-space:pre-wrap;}
.novel-tags{display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:1.5rem;}
.novel-tag{font-size:0.65rem;padding:0.2rem 0.6rem;background:var(--bg2);border:1px solid var(--border);border-radius:4px;color:var(--text3);transition:all 0.2s;}
.novel-tag:hover{border-color:var(--purple);color:var(--text);}

.chapter-list{display:flex;flex-direction:column;gap:0.5rem;}
.chapter-item{padding:1rem;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r2);display:flex;justify-content:space-between;align-items:center;transition:all 0.2s;text-decoration:none;}
.chapter-item:hover{border-color:var(--purple);background:rgba(138,100,255,0.04);}
.chapter-name{font-size:0.88rem;color:var(--text);font-weight:500;}
.chapter-date{font-size:0.7rem;color:var(--text3);}

.novel-side-card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:1.5rem;margin-bottom:1.5rem;}
.side-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}

@media(max-width:850px){
  .novel-hero-inner{grid-template-columns:1fr;text-align:center;}
  .novel-big-cover{width:180px;margin:0 auto;}
  .novel-meta-row{justify-content:center;}
  .novel-actions{justify-content:center;}
  .novel-body{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<nav id="navbar"></nav>

<div id="novel-content">
  <div style="padding:10rem; text-align:center; color:var(--text3);">Cargando historia...</div>
</div>

<script src="js/data.js"></script>
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
  import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyC1Fn6QXJu0UtH086vlpH2l2P-CI_ul3_A",
    authDomain: "arcana-553dd.firebaseapp.com",
    projectId: "arcana-553dd",
    storageBucket: "arcana-553dd.firebasestorage.app",
    messagingSenderId: "674195855924",
    appId: "1:674195855924:web:1f88f303c99cf6a4b0c861"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  async function loadNovel() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    
    if(!id) {
        window.location.href = 'catalog.html';
        return;
    }

    let novelData = null;

    // 1. Intentar cargar desde Firebase
    try {
      const docRef = doc(db, "novels", id);
      const docSnap = await getDoc(docRef);
      if (docSnap.exists()) {
        novelData = { id: docSnap.id, ...docSnap.data() };
      }
    } catch (e) { console.error("Error Firebase:", e); }

    // 2. Si no existe, buscar en data.js
    if (!novelData && window.ARCANA_NOVELS) {
      novelData = ARCANA_NOVELS.find(n => n.id == id);
    }

    if (novelData) {
      renderNovelPage(novelData);
    } else {
      document.getElementById('novel-content').innerHTML = `<div style="padding:10rem; text-align:center;">Historia no encontrada.</div>`;
    }
  }

  function renderNovelPage(n) {
    const content = document.getElementById('novel-content');
    document.title = `${n.title} — ARCANA`;

    content.innerHTML = `
      <div class="novel-hero">
        <div class="novel-hero-inner">
          <div class="novel-big-cover ${n.cover || 'cover-1'}">
            <div class="novel-big-cover-glow"></div>
            <div class="novel-big-icon">${n.icon || '🔮'}</div>
          </div>
          <div class="novel-header-info">
            <span class="novel-status-tag">${n.status}</span>
            <h1 class="novel-full-title">${n.title}</h1>
            <div class="novel-full-subtitle">${n.volSubtitle || ''}</div>
            <div class="novel-meta-row">
              <div class="novel-meta-item"><span class="novel-meta-label">Autor</span><span class="novel-meta-val">${n.author}</span></div>
              <div class="novel-meta-item"><span class="novel-meta-label">Géneros</span><span class="novel-meta-val">${n.genres ? n.genres.join(', ') : 'General'}</span></div>
              <div class="novel-meta-item"><span class="novel-meta-label">Valoración</span><span class="novel-meta-val">⭐ ${n.rating || '0'}</span></div>
            </div>
            <div class="novel-actions">
              <button class="btn-primary" onclick="window.location.href='reader.html?novel=${n.id}&ch=1'">Comenzar lectura</button>
              <button class="btn-ghost" onclick="toggleFav(this)">♡ Añadir a favoritos</button>
            </div>
          </div>
        </div>
      </div>

      <div class="novel-body">
        <div class="novel-main-col">
          <div class="novel-section-title">Sinopsis</div>
          <div class="novel-synopsis">${n.desc}</div>
          
          <div class="novel-section-title">Índice de capítulos</div>
          <div class="chapter-list">
            ${n.chapters > 0 ? 
              `<a href="#" class="chapter-item"><span class="chapter-name">Próximamente: Capítulos de Firebase</span></a>` :
              `<div style="color:var(--text3); font-size:0.85rem;">Esta obra aún no tiene capítulos publicados.</div>`
            }
          </div>
        </div>

        <aside class="novel-sidebar">
          <div class="novel-side-card">
            <div class="side-stat-grid">
              <div><div class="novel-meta-label">Lecturas</div><div class="novel-meta-val">${n.viewsNum || 0}</div></div>
              <div><div class="novel-meta-label">Favoritos</div><div class="novel-meta-val">${n.favorites || 0}</div></div>
            </div>
          </div>
          <div class="novel-section-title">Etiquetas</div>
          <div class="novel-tags">
            ${n.tags ? n.tags.map(t => `<span class="novel-tag">#${t}</span>`).join('') : ''}
          </div>
        </aside>
      </div>
    `;
  }

  // Inicializar
  initCanvas('bg-canvas');
  renderNavbar('novel');
  loadNovel();
</script>

<div id="toast"></div>
</body>
</html>
