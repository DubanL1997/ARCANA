<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novela — ARCANA</title>
<link rel="stylesheet" href="css/arcana.css">
<style>
.novel-hero{position:relative;z-index:1;padding:6rem 2rem 3rem;background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);}
.novel-hero-inner{max-width:1000px;margin:0 auto;display:grid;grid-template-columns:220px 1fr;gap:3rem;align-items:start;}
.novel-big-cover{aspect-ratio:2/3;border-radius:var(--r);border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.5);}
.novel-big-cover-glow{position:absolute;inset:0;background:radial-gradient(circle at 50% 40%,rgba(138,100,255,0.2),transparent 60%);}
.novel-big-icon{font-size:5rem;filter:drop-shadow(0 0 25px rgba(138,100,255,0.5));position:relative;}
.novel-header-info{padding-top:1rem;}
.novel-label{font-size:0.65rem;letter-spacing:0.3em;color:var(--purple3);text-transform:uppercase;margin-bottom:0.8rem;display:block;}
.novel-title-big{font-family:var(--display);font-size:clamp(2rem,5vw,3.5rem);font-weight:900;color:var(--text);line-height:1.1;margin-bottom:0.5rem;}
.novel-author-link{color:var(--text2);font-size:1.1rem;text-decoration:none;transition:color 0.2s;}
.novel-author-link:hover{color:var(--purple3);}
.novel-stats-bar{display:flex;gap:2rem;margin-top:2rem;padding:1.5rem 0;border-top:1px solid var(--border2);}
.stat-item{display:flex;flex-direction:column;gap:0.3rem;}
.stat-val{font-family:var(--display);font-size:1.4rem;font-weight:700;color:var(--text);}
.stat-lab{font-size:0.6rem;text-transform:uppercase;letter-spacing:0.15em;color:var(--text3);}

.novel-body{max-width:1000px;margin:0 auto;padding:3rem 2rem;display:grid;grid-template-columns:1fr 300px;gap:4rem;}
.novel-section-title{font-family:var(--display);font-size:1rem;font-weight:600;color:var(--text);letter-spacing:0.1em;margin-bottom:1.5rem;padding-bottom:0.5rem;border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:0.6rem;}
.novel-synopsis{font-family:var(--serif);line-height:1.8;color:var(--text2);font-size:1.1rem;margin-bottom:3rem;white-space:pre-wrap;}

.chapter-list{display:grid;gap:0.5rem;}
.chapter-item{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.2rem;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r2);text-decoration:none;transition:all 0.2s;}
.chapter-item:hover{background:var(--surface);border-color:var(--purple);transform:translateX(5px);}
.chapter-name{font-size:0.9rem;color:var(--text2);font-weight:500;}
.chapter-date{font-size:0.7rem;color:var(--text3);}

.comment-item{display:flex;gap:1rem;margin-bottom:1.5rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border2);}
.comment-avatar{width:40px;height:40px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;overflow:hidden;}
.comment-body{flex:1;}
.comment-meta{display:flex;justify-content:space-between;margin-bottom:0.4rem;}
.comment-user{font-size:0.85rem;font-weight:600;color:var(--text);}
.comment-date{font-size:0.7rem;color:var(--text3);}
.comment-text{font-size:0.9rem;color:var(--text2);line-height:1.5;}

@media(max-width:850px){
  .novel-hero-inner{grid-template-columns:1fr;text-align:center;}
  .novel-big-cover{width:180px;margin:0 auto;}
  .novel-stats-bar{justify-content:center;}
  .novel-body{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<nav id="navbar"></nav>

<div id="novel-page-content">
  <div style="padding:10rem; text-align:center; color:var(--text3);">Invocando historia...</div>
</div>

<footer id="footer"></footer>
<div id="auth-modal"></div>
<div id="toast"></div>

<script src="js/data.js"></script>
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
  import { getFirestore, doc, getDoc, collection, addDoc, query, where, orderBy, getDocs, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
  import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

  const firebaseConfig = {
    apiKey: "AIzaSyC1Fn6QXJu0UtH086vlpH2l2P-CI_ul3_A",
    authDomain: "arcana-553dd.firebaseapp.com",
    projectId: "arcana-553dd",
    storageBucket: "arcana-553dd.firebasestorage.app",
    messagingSenderId: "674195855924",
    appId: "1:674195855924:web:1f88f303c99cf6a4b0c861"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  onAuthStateChanged(auth, user => { window._currentUser = user; });

  async function initNovelPage() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    if(!id) { window.location.href = 'catalog.html'; return; }

    try {
      const docSnap = await getDoc(doc(db, "novels", id));
      if (docSnap.exists()) {
        renderNovel(id, docSnap.data());
        loadChapters(id);
        loadComments(id);
      } else {
        // Buscar en data.js local si no está en Firebase
        const local = ARCANA_NOVELS.find(n => n.id == id);
        if(local) renderNovel(id, local);
        else document.getElementById('novel-page-content').innerHTML = "Novela no encontrada.";
      }
    } catch (e) { console.error(e); }
  }

  function renderNovel(id, n) {
    document.title = `${n.title} — ARCANA`;
    const content = document.getElementById('novel-page-content');
    content.innerHTML = `
      <section class="novel-hero">
        <div class="novel-hero-inner">
          <div class="novel-big-cover ${n.cover || 'cover-1'}">
            <div class="novel-big-cover-glow"></div>
            <div class="novel-big-icon">${n.icon || '🔮'}</div>
          </div>
          <div class="novel-header-info">
            <span class="novel-label">${n.status || 'En curso'}</span>
            <h1 class="novel-title-big">${n.title}</h1>
            <p>por <a href="#" class="novel-author-link">${n.author}</a></p>
            <div class="novel-stats-bar">
              <div class="stat-item"><span class="stat-val">${n.rating || '0.0'}</span><span class="stat-lab">Rating</span></div>
              <div class="stat-item"><span class="stat-val">${n.viewsNum || 0}</span><span class="stat-lab">Lecturas</span></div>
              <div class="stat-item"><span class="stat-val">${n.favorites || 0}</span><span class="stat-lab">Favoritos</span></div>
            </div>
            <div style="margin-top:2rem; display:flex; gap:1rem;">
              <button class="btn-primary" onclick="window.startReading('${id}')">📖 Empezar a leer</button>
              <button class="btn-ghost" onclick="showToast('❤️ Añadido a favoritos')">♡ Favorito</button>
            </div>
          </div>
        </div>
      </section>

      <div class="novel-body">
        <main>
          <div class="novel-section-title">✨ Sinopsis</div>
          <div class="novel-synopsis">${n.desc}</div>

          <div class="novel-section-title">📜 Índice de Capítulos</div>
          <div id="chaptersList" class="chapter-list">
            <p style="color:var(--text3)">Buscando manuscritos...</p>
          </div>

          <div class="novel-section-title" style="margin-top:4rem;">💬 Comunidad</div>
          <div class="publish-form" style="margin-bottom:2rem; padding:1.5rem;">
            <textarea id="commentInput" class="form-textarea" placeholder="¿Qué te pareció esta historia?" style="min-height:80px;"></textarea>
            <div style="text-align:right; margin-top:1rem;">
              <button class="btn-primary" onclick="window.submitComment()">Enviar comentario</button>
            </div>
          </div>
          <div id="commentsList"></div>
        </main>

        <aside>
          <div class="novel-section-title">🏷️ Etiquetas</div>
          <div style="display:flex; flex-wrap:wrap; gap:0.5rem;">
            ${n.genres ? n.genres.map(g => `<span class="genre-mini">${g}</span>`).join('') : ''}
          </div>
        </aside>
      </div>
    `;
  }

  // Cargar Capítulos Reales
  async function loadChapters(novelId) {
    const list = document.getElementById('chaptersList');
    const q = query(collection(db, "chapters"), where("novelId", "==", novelId), orderBy("createdAt", "asc"));
    const snap = await getDocs(q);
    
    if(snap.empty) {
      list.innerHTML = `<p style="font-size:0.8rem; color:var(--text3);">Aún no hay capítulos publicados.</p>`;
      return;
    }

    let html = '';
    snap.forEach((doc, index) => {
      const c = doc.data();
      html += `
        <a href="reader.html?novel=${novelId}&ch=${index}" class="chapter-item">
          <span class="chapter-name">${c.title}</span>
          <span class="chapter-date">Cap. ${index + 1}</span>
        </a>`;
    });
    list.innerHTML = html;
  }

  // Cargar Comentarios Reales
  window.loadComments = async function(novelId) {
    const list = document.getElementById('commentsList');
    const q = query(collection(db, "comments"), where("novelId", "==", novelId), orderBy("createdAt", "desc"));
    const snap = await getDocs(q);
    
    let html = '';
    snap.forEach(doc => {
      const c = doc.data();
      const date = c.createdAt ? new Date(c.createdAt.seconds * 1000).toLocaleDateString() : 'Reciente';
      html += `
        <div class="comment-item">
          <div class="comment-avatar">${c.userPhoto ? `<img src="${c.userPhoto}" style="width:100%">` : '👤'}</div>
          <div class="comment-body">
            <div class="comment-meta"><span class="comment-user">${c.userName}</span><span class="comment-date">${date}</span></div>
            <p class="comment-text">${c.text}</p>
          </div>
        </div>`;
    });
    list.innerHTML = html || `<p style="text-align:center; color:var(--text3);">No hay comentarios aún.</p>`;
  };

  window.submitComment = async function() {
    const input = document.getElementById('commentInput');
    const text = input.value.trim();
    if(!window._currentUser) { showToast('Inicia sesión para comentar'); return; }
    if(!text) return;

    const novelId = new URLSearchParams(window.location.search).get('id');
    try {
      await addDoc(collection(db, "comments"), {
        novelId, text,
        uid: window._currentUser.uid,
        userName: window._currentUser.displayName || 'Anónimo',
        userPhoto: window._currentUser.photoURL || null,
        createdAt: serverTimestamp()
      });
      input.value = '';
      showToast('✦ Comentario publicado');
      loadComments(novelId);
    } catch (e) { showToast('Error al comentar'); }
  };

  window.startReading = (id) => window.location.href = `reader.html?novel=${id}&ch=0`;

  initCanvas('bg-canvas');
  renderNavbar('catalog');
  renderFooter();
  initNovelPage();
</script>
</body>
</html>
