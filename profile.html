<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil — ARCANA</title>
<link rel="stylesheet" href="css/arcana.css">
<style>
.profile-hero{position:relative;z-index:1;padding:5rem 2rem 3rem;background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);}
.profile-hero-inner{max-width:900px;margin:0 auto;}
.profile-banner{height:160px;border-radius:var(--r);background:linear-gradient(135deg,var(--surface),var(--bg3));border:1px solid var(--border);margin-bottom:-50px;}
.profile-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:2rem;display:grid;grid-template-columns:auto 1fr;gap:2rem;align-items:center;}
.profile-avatar-big{width:120px;height:120px;border-radius:50%;background:var(--bg2);border:4px solid var(--surface);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:3rem;margin-top:-60px;box-shadow:0 8px 24px rgba(0,0,0,0.5);}
.profile-avatar-big img{width:100%;height:100%;object-fit:cover;}
.profile-info-main{margin-top:1rem;}
.profile-name-big{font-family:var(--display);font-size:2rem;font-weight:900;color:var(--text);margin-bottom:0.2rem;}
.profile-bio-text{font-family:var(--serif);font-size:1.05rem;color:var(--text2);line-height:1.6;margin:1rem 0;}
.profile-stats-row{display:flex;gap:2rem;margin-top:1.5rem;}
.p-stat{display:flex;flex-direction:column;}
.p-stat-n{font-family:var(--display);font-size:1.4rem;font-weight:700;color:var(--text);}
.p-stat-l{font-size:0.6rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);}

.profile-content-area{max-width:900px;margin:0 auto;padding:3rem 2rem;}
.tab-nav{display:flex;gap:2rem;border-bottom:1px solid var(--border2);margin-bottom:2rem;}
.tab-link{padding:1rem 0;font-size:0.85rem;font-weight:600;color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all 0.2s;}
.tab-link.active{color:var(--purple3);border-bottom-color:var(--purple);}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<nav id="navbar"></nav>

<div class="profile-hero">
  <div class="profile-hero-inner">
    <div class="profile-banner"></div>
    <div class="profile-card" id="profileHeader">
      <div style="padding:2rem; color:var(--text3);">Cargando identidad...</div>
    </div>
  </div>
</div>

<div class="profile-content-area">
  <div class="tab-nav">
    <button class="tab-link active">Mis Publicaciones</button>
  </div>
  <div id="authorNovelsGrid" class="novels-grid">
    </div>
</div>

<footer id="footer"></footer>
<div id="toast"></div>

<script src="js/data.js"></script>
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
  import { getFirestore, collection, query, where, getDocs } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
  import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

  const firebaseConfig = {
    apiKey: "AIzaSyC1Fn6QXJu0UtH086vlpH2l2P-CI_ul3_A",
    authDomain: "arcana-553dd.firebaseapp.com",
    projectId: "arcana-553dd",
    storageBucket: "arcana-553dd.firebasestorage.app",
    messagingSenderId: "674195855924",
    appId: "1:674195855924:web:1f88f303c99cf6a4b0c861"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  onAuthStateChanged(auth, user => {
    if (user) {
      renderProfile(user);
      loadAuthorNovels(user.uid);
    } else {
      window.location.href = 'index.html'; // Redirigir si no hay sesión
    }
  });

  function renderProfile(user) {
    const header = document.getElementById('profileHeader');
    header.innerHTML = `
      <div class="profile-avatar-big">
        ${user.photoURL ? `<img src="${user.photoURL}">` : `<span>${user.displayName?.charAt(0) || 'U'}</span>`}
      </div>
      <div class="profile-info-main">
        <h1 class="profile-name-big">${user.displayName || 'Escritor de ARCANA'}</h1>
        <p class="profile-bio-text">Explorando mundos a través de la escritura en la plataforma ARCANA.</p>
        <div class="profile-stats-row">
          <div class="p-stat"><span class="p-stat-n" id="novelCount">--</span><span class="p-stat-l">Novelas</span></div>
          <div class="p-stat"><span class="p-stat-n">0</span><span class="p-stat-l">Seguidores</span></div>
        </div>
      </div>
    `;
  }

  async function loadAuthorNovels(uid) {
    const grid = document.getElementById('authorNovelsGrid');
    try {
      const q = query(collection(db, "novels"), where("authorId", "==", uid));
      const snap = await getDocs(q);
      
      document.getElementById('novelCount').textContent = snap.size;

      if (snap.empty) {
        grid.innerHTML = `<p style="grid-column:1/-1; text-align:center; color:var(--text3); padding:4rem;">Aún no has publicado ninguna historia.</p>`;
        return;
      }

      let html = '';
      snap.forEach(doc => {
        html += novelCardHTML({ id: doc.id, ...doc.data() });
      });
      grid.innerHTML = html;
    } catch (e) {
      console.error(e);
    }
  }

  initCanvas('bg-canvas');
  renderNavbar('profile');
  renderFooter();
</script>
</body>
</html>
