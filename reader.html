<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leyendo — ARCANA</title>
<link rel="stylesheet" href="css/arcana.css">
<style>
  .reader-container { max-width: 800px; margin: 0 auto; padding: 8rem 2rem; min-height: 100vh; position: relative; z-index: 1;}
  .reader-nav-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem; border-bottom: 1px solid var(--border2); padding-bottom: 1rem; }
  .reader-label { font-size: 0.7rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.2em; }
  .reader-title { font-family: var(--display); font-size: 2rem; color: var(--text); margin-top: 0.5rem; }
  
  .reader-content { 
    font-family: var(--serif); 
    font-size: 1.25rem; 
    line-height: 1.9; 
    color: var(--text2); 
    white-space: pre-wrap; 
    text-align: justify;
  }
  
  .reader-content::first-letter {
    float: left; font-family: var(--display); font-size: 4rem; line-height: 1; padding: 0.5rem 0.8rem 0 0; color: var(--purple3); text-transform: uppercase;
  }
  
  .reader-footer-nav { display: flex; justify-content: space-between; margin-top: 5rem; padding-top: 2rem; border-top: 1px solid var(--border2); }
  
  /* Configuración del Lector */
  .reader-settings { position: fixed; bottom: 2rem; right: 2rem; display: flex; gap: 0.5rem; z-index: 100; background: var(--surface); padding: 0.5rem; border-radius: 50px; border: 1px solid var(--border); }
  .setting-btn { width: 40px; height: 40px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; background: var(--bg3); color: var(--text2); transition: all 0.2s; }
  .setting-btn:hover { background: var(--purple); color: white; }

  .theme-sepia { background: #f4ecd8 !important; }
  .theme-sepia .reader-content { color: #5b4636 !important; }
  .theme-sepia .reader-title, .theme-sepia .reader-label { color: #433422 !important; }
</style>
</head>
<body class="theme-dark">

<canvas id="bg-canvas"></canvas>
<nav id="navbar"></nav>

<div class="reader-container">
  <header class="reader-nav-top">
    <div>
      <span id="ch-label" class="reader-label">Cargando...</span>
      <h1 id="ch-title" class="reader-title">Invocando Manuscrito</h1>
    </div>
    <a id="back-to-novel" href="#" class="btn-ghost" style="font-size: 0.7rem;">✕ Salir</a>
  </header>

  <article id="ch-body" class="reader-content">
    Cargando el contenido desde los archivos de ARCANA...
  </article>

  <nav class="reader-footer-nav">
    <button id="prev-btn" class="btn-lg btn-lg-ghost">← Anterior</button>
    <button id="next-btn" class="btn-lg btn-lg-primary">Siguiente →</button>
  </nav>
</div>

<div class="reader-settings">
  <button class="setting-btn" onclick="changeFontSize(-1)">A-</button>
  <button class="setting-btn" onclick="changeFontSize(1)">A+</button>
  <button class="setting-btn" style="background:#f4ecd8; color:#5b4636" onclick="setTheme('sepia')">S</button>
  <button class="setting-btn" style="background:#06060f; color:#fff" onclick="setTheme('dark')">D</button>
</div>

<footer id="footer"></footer>
<div id="toast"></div>

<script src="js/data.js"></script>
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
  import { getFirestore, collection, query, where, orderBy, getDocs } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyC1Fn6QXJu0UtH086vlpH2l2P-CI_ul3_A",
    authDomain: "arcana-553dd.firebaseapp.com",
    projectId: "arcana-553dd",
    storageBucket: "arcana-553dd.firebasestorage.app",
    messagingSenderId: "674195855924",
    appId: "1:674195855924:web:1f88f303c99cf6a4b0c861"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let currentFontSize = 1.25;

  async function initReader() {
    const params = new URLSearchParams(window.location.search);
    const novelId = params.get('novel');
    const chIndex = parseInt(params.get('ch')) || 0;

    if (!novelId) { window.location.href = 'catalog.html'; return; }

    document.getElementById('back-to-novel').href = `novel.html?id=${novelId}`;

    try {
      // Consultamos todos los capítulos de la novela ordenados por fecha
      const q = query(
        collection(db, "chapters"),
        where("novelId", "==", novelId),
        orderBy("createdAt", "asc")
      );
      
      const snap = await getDocs(q);
      const chapters = [];
      snap.forEach(doc => chapters.push(doc.data()));

      if (chapters.length > 0 && chapters[chIndex]) {
        const ch = chapters[chIndex];
        
        // Renderizar contenido
        document.getElementById('ch-label').textContent = `Capítulo ${chIndex + 1}`;
        document.getElementById('ch-title').textContent = ch.title;
        document.getElementById('ch-body').textContent = ch.content;
        document.title = `${ch.title} — ARCANA`;

        // Navegación
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');

        if (chIndex > 0) {
          prevBtn.onclick = () => window.location.href = `reader.html?novel=${novelId}&ch=${chIndex - 1}`;
        } else {
          prevBtn.style.display = 'none';
        }

        if (chIndex < chapters.length - 1) {
          nextBtn.onclick = () => window.location.href = `reader.html?novel=${novelId}&ch=${chIndex + 1}`;
        } else {
          nextBtn.textContent = "Fin de la obra";
          nextBtn.onclick = () => window.location.href = `novel.html?id=${novelId}`;
        }
      } else {
        document.getElementById('ch-body').innerHTML = "No se encontró el capítulo o aún no ha sido publicado.";
      }
    } catch (e) {
      console.error(e);
      document.getElementById('ch-body').innerHTML = "Error al conectar con la biblioteca arcana.";
    }
  }

  // Funciones de personalización
  window.changeFontSize = (delta) => {
    currentFontSize += delta * 0.1;
    document.getElementById('ch-body').style.fontSize = `${currentFontSize}rem`;
  };

  window.setTheme = (t) => {
    document.body.className = `theme-${t}`;
    if(t === 'sepia') initCanvas('bg-canvas', true); // Detener canvas en sepia para leer mejor
    else initCanvas('bg-canvas');
  };

  initCanvas('bg-canvas');
  renderNavbar('catalog');
  initReader();
</script>
</body>
</html>
