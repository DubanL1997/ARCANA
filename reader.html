<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leyendo — ARCANA</title>
<link rel="stylesheet" href="css/arcana.css">
<style>
  .reader-container { max-width: 800px; margin: 0 auto; padding: 8rem 2rem; min-height: 100vh; }
  .reader-nav-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem; border-bottom: 1px solid var(--border2); padding-bottom: 1rem; }
  .reader-label { font-size: 0.7rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.2em; }
  .reader-title { font-family: var(--display); font-size: 2rem; color: var(--text); margin-top: 0.5rem; }
  
  .reader-content { 
    font-family: var(--serif); 
    font-size: 1.25rem; 
    line-height: 1.9; 
    color: var(--text2); 
    white-space: pre-wrap; 
    text-align: justify;
  }
  
  /* Drop Cap para la primera letra */
  .reader-content::first-letter {
    float: left;
    font-family: var(--display);
    font-size: 4.5rem;
    line-height: 0.8;
    padding-top: 4px;
    padding-right: 8px;
    color: var(--purple3);
    font-weight: 900;
  }

  .reader-footer { display: flex; justify-content: space-between; margin-top: 4rem; padding-top: 2rem; border-top: 1px solid var(--border2); }
  
  /* Controles de lectura */
  .reader-settings { position: fixed; bottom: 2rem; right: 2rem; display: flex; gap: 0.5rem; background: var(--surface); padding: 0.5rem; border-radius: 50px; border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.3); z-index: 100; }
  .setting-btn { width: 35px; height: 35px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; }
</style>
</head>
<body class="theme-dark">
<canvas id="bg-canvas"></canvas>
<nav id="navbar"></nav>

<div class="reader-container">
  <div id="reader-loading" style="text-align:center; padding:5rem; color:var(--text3);">Abriendo grimorio...</div>
  
  <div id="reader-ui" style="display:none;">
    <header class="reader-nav-top">
      <div>
        <div class="reader-label" id="ch-label">Capítulo I</div>
        <h1 class="reader-title" id="ch-title">Cargando...</h1>
      </div>
      <a href="#" id="back-to-novel" class="btn-ghost" style="font-size:0.7rem;">✕ Salir</a>
    </header>

    <article class="reader-content" id="ch-body"></article>

    <footer class="reader-footer">
      <button class="btn-outline" id="prev-btn">← Anterior</button>
      <button class="btn-outline" id="next-btn">Siguiente →</button>
    </footer>
  </div>
</div>

<div class="reader-settings">
  <button class="setting-btn" style="background:#f5f5f5; color:#333;" onclick="setTheme('light')">A</button>
  <button class="setting-btn" style="background:#1a1a1a; color:#eee; border:1px solid #444;" onclick="setTheme('dark')">A</button>
</div>

<script src="js/data.js"></script>
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
  import { getFirestore, collection, query, where, getDocs, orderBy, limit } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyC1Fn6QXJu0UtH086vlpH2l2P-CI_ul3_A",
    authDomain: "arcana-553dd.firebaseapp.com",
    projectId: "arcana-553dd",
    storageBucket: "arcana-553dd.firebasestorage.app",
    messagingSenderId: "674195855924",
    appId: "1:674195855924:web:1f88f303c99cf6a4b0c861"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  async function loadChapter() {
    const params = new URLSearchParams(window.location.search);
    const novelId = params.get('id') || params.get('novel');
    const chIndex = parseInt(params.get('ch')) || 0;

    if (!novelId) return;

    document.getElementById('back-to-novel').href = `novel.html?id=${novelId}`;

    try {
      // Intentar buscar capítulos en Firebase para esta novela
      const q = query(
        collection(db, "chapters"), 
        where("novelId", "==", novelId),
        orderBy("createdAt", "asc")
      );
      
      const snap = await getDocs(q);
      const chapters = [];
      snap.forEach(doc => chapters.push(doc.data()));

      if (chapters.length > 0 && chapters[chIndex]) {
        renderChapter(chapters[chIndex], chIndex, chapters.length);
      } else {
        // Si no hay en Firebase, buscar en data.js
        loadLocalChapter(novelId, chIndex);
      }
    } catch (e) {
      console.error(e);
      loadLocalChapter(novelId, chIndex);
    }
  }

  function loadLocalChapter(novelId, idx) {
    // Aquí iría tu lógica actual de data.js si tienes textos guardados allí
    document.getElementById('reader-loading').textContent = "El contenido de este capítulo aún no se ha sincronizado.";
  }

  function renderChapter(ch, idx, total) {
    document.getElementById('reader-loading').style.display = 'none';
    document.getElementById('reader-ui').style.display = 'block';
    
    document.getElementById('ch-label').textContent = ch.numberLabel || `Capítulo ${idx + 1}`;
    document.getElementById('ch-title').textContent = ch.title;
    document.getElementById('ch-body').textContent = ch.content;

    // Configurar botones de navegación
    const prev = document.getElementById('prev-btn');
    const next = document.getElementById('next-btn');
    
    const params = new URLSearchParams(window.location.search);
    const novelId = params.get('id') || params.get('novel');

    prev.onclick = () => { if(idx > 0) window.location.href = `reader.html?novel=${novelId}&ch=${idx-1}`; };
    next.onclick = () => { if(idx < total-1) window.location.href = `reader.html?novel=${novelId}&ch=${idx+1}`; };
    
    prev.style.opacity = idx === 0 ? '0.3' : '1';
    next.style.opacity = idx === total-1 ? '0.3' : '1';
    
    window.scrollTo(0,0);
  }

  window.setTheme = (t) => {
    document.body.className = t === 'light' ? 'theme-light' : 'theme-dark';
    if(t === 'light') {
        document.body.style.background = "#ffffff";
        document.body.style.setProperty('--text', '#1a1a1a');
        document.body.style.setProperty('--text2', '#333333');
    } else {
        document.body.style.background = "var(--bg)";
        document.body.style.setProperty('--text', '#ffffff');
        document.body.style.setProperty('--text2', '#cccccc');
    }
  };

  loadChapter();
  initCanvas('bg-canvas');
  renderNavbar('reader');
</script>
</body>
</html>
